name: simulation-test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'xschem/**'
      - '.github/workflows/simulation-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'xschem/**'
      - '.github/workflows/simulation-test.yml'

permissions:
  contents: read

concurrency:
  group: simulation-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testbenches:
    name: Simulate Xschem testbenches
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      # IIC-OSIC-TOOLS ships xschem, ngspice and the IHP SG13G2 PDK.
      image: hpretl/iic-osic-tools:latest
      options: --user root
    env:
      PDK: ihp-sg13g2
      PDK_ROOT: /foss/pdks
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up IIC-OSIC-TOOLS environment
        # GitHub Actions bypasses the container entrypoint, so the image's tool
        # environment is never initialised: $PATH is overridden with the runner
        # host's PATH and LD_LIBRARY_PATH/PYTHONPATH/KLAYOUT_PATH/... are unset.
        # Several tools (e.g. klayout, which lives in /foss/tools/klayout and not
        # in a bin/ dir) are then "not found". Replicate the entrypoint by
        # sourcing the image's single source of truth for the environment and
        # persist the result so every subsequent step sees the full toolchain.
        shell: bash
        run: |
          set -a
          source /etc/profile.d/iic-osic-tools-setup.sh
          set +a
          {
            echo "PATH=$PATH"
            echo "PYTHONPATH=$PYTHONPATH"
            echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
            echo "LIBRARY_PATH=$LIBRARY_PATH"
            echo "CPATH=$CPATH"
            echo "SAK=$SAK"
            echo "KLAYOUT_HOME=$KLAYOUT_HOME"
            echo "KLAYOUT_PATH=$KLAYOUT_PATH"
            echo "PDK=$PDK"
            echo "PDKPATH=$PDKPATH"
            echo "PDK_ROOT=$PDK_ROOT"
            echo "STD_CELL_LIBRARY=$STD_CELL_LIBRARY"
            echo "SPICE_USERINIT_DIR=$SPICE_USERINIT_DIR"
          } >> "$GITHUB_ENV"

      - name: Show tool environment
        run: |
          echo "PDK=$PDK  PDK_ROOT=$PDK_ROOT"
          echo "xschem  -> $(command -v xschem  || echo NOT FOUND)"
          echo "ngspice -> $(command -v ngspice || echo NOT FOUND)"
          xschem --version 2>&1 | head -n 1 || true
          ngspice --version 2>&1 | head -n 1 || true
          ls "$PDK_ROOT" || true

      - name: Run testbench simulations
        run: ./xschem/run_simulation_tests.sh

      - name: Upload simulation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-logs
          path: xschem/simulations/simulation_logs/
          if-no-files-found: ignore
