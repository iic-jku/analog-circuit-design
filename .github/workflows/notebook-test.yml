name: notebook-test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'gmid/**'
      - 'requirements.txt'
      - '.github/workflows/notebook-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'gmid/**'
      - 'requirements.txt'
      - '.github/workflows/notebook-test.yml'

permissions:
  contents: read

concurrency:
  group: notebook-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notebooks:
    name: Execute gm/ID notebooks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbconvert ipykernel

      - name: Execute notebooks
        run: ./gmid/test_notebooks.sh
