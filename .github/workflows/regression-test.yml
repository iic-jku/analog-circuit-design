name: regression-test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'xschem/**'
      - '.github/workflows/regression-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'xschem/**'
      - '.github/workflows/regression-test.yml'

permissions:
  contents: read

concurrency:
  group: regression-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testbenches:
    name: Simulate Xschem testbenches
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      # IIC-OSIC-TOOLS ships xschem, ngspice and the IHP SG13G2 PDK.
      image: hpretl/iic-osic-tools:latest
      options: --user root
    env:
      PDK: ihp-sg13g2
      PDK_ROOT: /foss/pdks
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Restore IIC-OSIC-TOOLS PATH
        # GitHub Actions overrides $PATH for container jobs with the runner
        # host's PATH, dropping the image's tool directories. Re-add them so
        # xschem/ngspice are found again.
        run: |
          # Baseline: every bin/ dir the image ships (covers binary tools).
          find /foss -maxdepth 6 \( -path /foss/pdks -o -path /foss/designs \) -prune \
            -o -type d -name bin -print 2>/dev/null | sort -u >> "$GITHUB_PATH"
          for d in /foss/bin /usr/local/bin; do
            [ -d "$d" ] && echo "$d" >> "$GITHUB_PATH"
          done
          # Also locate the exact tools we need by name, in case any live
          # outside a bin/ dir, and add their directories.
          for tool in xschem ngspice; do
            p="$(find /foss \( -path /foss/pdks -o -path /foss/designs \) -prune \
                  -o -name "$tool" -print 2>/dev/null | head -n1)"
            if [ -n "$p" ]; then
              dirname "$p" >> "$GITHUB_PATH"
              echo "located $tool in $(dirname "$p")"
            else
              echo "WARNING: $tool not found under /foss" >&2
            fi
          done

      - name: Show tool environment
        run: |
          echo "PDK=$PDK  PDK_ROOT=$PDK_ROOT"
          echo "xschem  -> $(command -v xschem  || echo NOT FOUND)"
          echo "ngspice -> $(command -v ngspice || echo NOT FOUND)"
          xschem --version 2>&1 | head -n 1 || true
          ngspice --version 2>&1 | head -n 1 || true
          ls "$PDK_ROOT" || true

      - name: Run testbench regression
        run: ./xschem/run_regression.sh

      - name: Upload simulation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-logs
          path: xschem/simulations/regression_logs/
          if-no-files-found: ignore
